analytics-service {

  # ============================================================
  # TimescaleDB — GPS история и агрегаты
  # ============================================================
  timescale-db {
    url = "jdbc:postgresql://localhost:5432/tracker_gps"
    url = ${?TIMESCALE_URL}
    user = "analytics"
    user = ${?TIMESCALE_USER}
    password = "analytics_pass"
    password = ${?TIMESCALE_PASSWORD}
    max-pool-size = 30
  }

  # ============================================================
  # PostgreSQL — шаблоны, расписания, история
  # ============================================================
  postgres {
    url = "jdbc:postgresql://localhost:5432/tracker_analytics"
    url = ${?POSTGRES_URL}
    user = "analytics"
    user = ${?POSTGRES_USER}
    password = "analytics_pass"
    password = ${?POSTGRES_PASSWORD}
    max-pool-size = 10
  }

  # ============================================================
  # Redis — кэш отчётов и прогресс экспорта
  # ============================================================
  redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
  }

  # ============================================================
  # S3/MinIO — хранение экспортированных файлов
  # ============================================================
  s3 {
    endpoint = "http://localhost:9000"
    endpoint = ${?S3_ENDPOINT}
    bucket = "analytics-reports"
    bucket = ${?S3_BUCKET}
    access-key = "minioadmin"
    access-key = ${?S3_ACCESS_KEY}
    secret-key = "minioadmin"
    secret-key = ${?S3_SECRET_KEY}
    presigned-url-ttl-hours = 24
  }

  # ============================================================
  # Кэширование
  # ============================================================
  cache {
    historical-ttl-minutes = 60
    realtime-ttl-minutes = 5
  }

  # ============================================================
  # Экспорт
  # ============================================================
  export {
    max-concurrent = 5
    temp-dir = "/tmp/analytics-export"
    temp-dir = ${?EXPORT_TEMP_DIR}
    max-file-size-mb = 100
    retention-days = 7
  }

  # ============================================================
  # Планировщик
  # ============================================================
  scheduler {
    enabled = true
    enabled = ${?SCHEDULER_ENABLED}
    check-interval-seconds = 60
    max-concurrent-schedules = 3
  }

  # ============================================================
  # HTTP-сервер
  # ============================================================
  server {
    host = "0.0.0.0"
    host = ${?SERVER_HOST}
    port = 8095
    port = ${?SERVER_PORT}
  }
}
